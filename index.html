<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>WorldlyCup — Where the World Cup Was Born</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{
    --bg:#081726; --panel:rgba(13,32,51,.84); --panel-solid:#0d2033;
    --ink:#eaf2fb; --muted:#8fb0cc; --line:#27496b;
    --gold:#f4c145; --teal:#2ec5b6; --green:#3ddc84; --red:#e8506b; --accent:#5aa9e6;
    --font:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);overflow:hidden}
  #map{position:absolute;inset:0}
  .maplibregl-popup{max-width:280px!important;font-family:var(--font)}
  .maplibregl-popup-content{background:var(--panel-solid);color:var(--ink);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .maplibregl-popup-tip{border-top-color:var(--panel-solid)!important;border-bottom-color:var(--panel-solid)!important}

  .topbar{position:absolute;top:0;left:0;right:0;height:58px;display:flex;align-items:center;
    gap:16px;padding:0 18px;z-index:5;
    background:linear-gradient(90deg,rgba(8,23,38,.96),rgba(8,23,38,.55) 70%,transparent)}
  .brand{font-weight:800;font-size:20px;letter-spacing:.3px;display:flex;align-items:center;gap:9px}
  .brand .globe{font-size:22px;filter:drop-shadow(0 0 8px rgba(90,169,230,.6))}
  .tabs{display:flex;gap:6px}
  .tab{font-size:13.5px;font-weight:600;color:var(--muted);background:transparent;border:1px solid transparent;
    padding:7px 14px;border-radius:20px;cursor:pointer;transition:.15s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:#08243a;background:linear-gradient(180deg,#7fc4f5,#5aa9e6);border:none;font-weight:700}

  .panel{position:absolute;top:70px;left:16px;width:340px;max-width:calc(100vw - 32px);
    background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:18px;padding:16px;z-index:6;
    box-shadow:0 18px 50px rgba(0,0,0,.45)}
  .panel h2{margin:0 0 4px;font-size:13px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted)}
  .row{display:flex;gap:8px;margin-top:10px}
  select,button{font-family:var(--font);font-size:14px;border-radius:11px;border:1px solid var(--line);
    background:#10283f;color:var(--ink);padding:10px 12px;cursor:pointer;transition:.15s}
  select{flex:1;appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 18px) 18px,calc(100% - 13px) 18px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
  button:hover{border-color:var(--accent)}
  button.primary{background:linear-gradient(180deg,#f4c145,#e0a92b);color:#3a2c00;border:none;font-weight:700;flex:1}
  button.ghost{background:#10283f}
  button.tiny{padding:7px 10px;font-size:12px}
  button:disabled{opacity:.45;cursor:default}
  .hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.45}
  .stat{margin-top:14px;font-size:13px;line-height:1.5;color:var(--muted);border-top:1px solid var(--line);padding-top:12px;display:none}
  .stat b{color:var(--ink)}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{font-size:11.5px;background:#13314c;border:1px solid var(--line);border-radius:20px;padding:3px 9px;color:var(--ink)}
  .chip .n{color:var(--teal);font-weight:700}

  /* game */
  .scoreline{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted);margin-bottom:10px}
  .scoreline b{color:var(--ink);font-size:15px}
  .clues{display:flex;flex-direction:column;gap:8px;margin:4px 0 12px}
  .clue{background:#10283f;border:1px solid var(--line);border-radius:11px;padding:9px 12px;font-size:14px;
    animation:slide .35s ease}
  .clue .k{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);display:block;margin-bottom:2px}
  @keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .lives{letter-spacing:3px;font-size:15px}
  .result{margin-top:6px;padding:11px 13px;border-radius:12px;font-size:14px;line-height:1.45;display:none}
  .result.win{background:rgba(61,220,132,.13);border:1px solid var(--green)}
  .result.lose{background:rgba(232,80,107,.13);border:1px solid var(--red)}
  .result b{color:var(--ink)}
  .pts{color:var(--gold);font-weight:700}

  .legend{position:absolute;bottom:16px;left:16px;z-index:6;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:10px 13px;font-size:12px;color:var(--muted);backdrop-filter:blur(14px)}
  .legend .sw{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:-1px}

  .pin{width:16px;height:16px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5);cursor:pointer;position:relative}
  .pin.home{background:var(--gold)} .pin.foreign{background:var(--teal)}
  .pin .badge{position:absolute;top:-7px;right:-7px;transform:rotate(45deg);background:#0d2033;color:#fff;
    border:1px solid #fff;border-radius:10px;font-size:10px;line-height:14px;min-width:15px;text-align:center;padding:0 2px}
  @media (max-width:560px){ .panel{width:calc(100vw - 24px);left:12px;top:62px} .brand small{display:none} }
</style>
</head>
<body>
<div id="map"></div>
<div class="topbar">
  <div class="brand"><span class="globe">🌍</span>WorldlyCup</div>
  <div class="tabs">
    <button class="tab active" data-mode="explore">Explore</button>
    <button class="tab" data-mode="game">Whose Team?</button>
  </div>
</div>

<!-- EXPLORE -->
<div class="panel" id="explorePanel">
  <h2>Explore a team's origins</h2>
  <div class="row"><select id="team"><option value="">Choose a national team…</option></select></div>
  <div class="row">
    <button class="primary" id="reveal">Reveal birthplaces</button>
    <button class="ghost tiny" id="labels">Labels: off</button>
    <button class="ghost tiny" id="reset">Reset</button>
  </div>
  <div class="hint" id="exploreHint">Pick a team, then reveal where its 26 players were born.</div>
  <div class="stat" id="stat"></div>
</div>

<!-- WHOSE TEAM? -->
<div class="panel" id="gamePanel" style="display:none">
  <div class="scoreline">
    <span>Score <b id="score">0</b></span>
    <span>Solved <b id="solved">0</b>/<b id="played">0</b></span>
    <span class="lives" id="lives" title="guesses left this round"></span>
  </div>
  <h2>Who does this player represent?</h2>
  <div class="clues" id="clues"></div>
  <div class="row">
    <button class="ghost" id="clueBtn">🔍 Next clue <span id="cluePts" style="color:var(--gold)"></span></button>
    <button class="primary" id="nextBtn" style="display:none">Next player ▶</button>
  </div>
  <div class="hint" id="gameHint">Click the country on the map you think they play for. The 48 competing nations are highlighted.</div>
  <div class="result" id="result"></div>
</div>

<div class="legend" id="legend">
  <span class="sw" style="background:var(--gold)"></span>Home country &nbsp;
  <span class="sw" style="background:var(--teal)"></span>Foreign birthplace
</div>

<script>
window.__E=[];
window.addEventListener('error', e=>window.__E.push('WIN: '+(e.message||e)+' @'+((e.filename||'').split('/').pop())+':'+e.lineno));
window.addEventListener('unhandledrejection', e=>window.__E.push('REJECT: '+(e.reason&&e.reason.message||e.reason)));
const ISO = f => { const p=f.properties; let i=p.ISO_A3_EH; if(!i||i==='-99') i=p.ISO_A3; return i; };
const POS = {GK:'Goalkeeper',DEF:'Defender',MID:'Midfielder',FWD:'Forward',FW:'Forward',ATT:'Forward'};
const TODAY = new Date('2026-06-29');
let MAP, DATA, GEO, mode='explore', markers=[], shaded=new Set(), labelsOn=false;
let TEAM_BY_ISO={}, POOL=[], used=new Set();
let round=null, score=0, solved=0, played=0;

const age = dob => { const d=new Date(dob); let a=TODAY.getFullYear()-d.getFullYear();
  if(TODAY.getMonth()<d.getMonth()||(TODAY.getMonth()==d.getMonth()&&TODAY.getDate()<d.getDate())) a--; return a; };

async function init(){
  [GEO, DATA] = await Promise.all([
    fetch('countries_50m.geojson').then(r=>r.json()),
    fetch('app_data.json').then(r=>r.json())
  ]);
  GEO.features.forEach(f=> f.id = ISO(f));
  DATA.teams.forEach(t=>{ if(t.iso3) TEAM_BY_ISO[t.iso3]=t; });
  // quiz pool: high-confidence players with an interesting origin story
  DATA.teams.forEach(t=>t.players.forEach(p=>{
    if(p.confidence==='high' && p.lat!=null && (p.born_abroad||p.switched_from.length||p.citizenships.length>1))
      POOL.push({p, team:t});
  }));

  MAP = new maplibregl.Map({
    container:'map',
    style:{ version:8, glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
      sources:{}, layers:[{ id:'bg', type:'background', paint:{'background-color':'#081726'} }] },
    center:[8,26], zoom:1.7, minZoom:1, maxZoom:7, attributionControl:false, renderWorldCopies:true
  });
  MAP.on('error', e=>window.__E.push('MAP: '+((e&&e.error&&e.error.message)||JSON.stringify(e).slice(0,200))));
  MAP.addControl(new maplibregl.NavigationControl({showCompass:false}),'bottom-right');
  MAP.on('load', ()=>{
    // add the country layers after load (robust for large inline GeoJSON)
    MAP.addSource('countries', { type:'geojson', data:GEO });
    MAP.addLayer({ id:'country-fill', type:'fill', source:'countries', paint:{
        'fill-color':['case',
          ['boolean',['feature-state','correct'],false], '#3ddc84',
          ['boolean',['feature-state','wrong'],false], '#e8506b',
          ['boolean',['feature-state','home'],false], '#f4c145',
          ['boolean',['feature-state','origin'],false], '#2ec5b6',
          ['boolean',['feature-state','team'],false], '#2c5d8a',
          '#11304a'],
        'fill-opacity':['case',
          ['boolean',['feature-state','correct'],false], .92,
          ['boolean',['feature-state','wrong'],false], .9,
          ['boolean',['feature-state','home'],false], .92,
          ['boolean',['feature-state','origin'],false], .85,
          ['boolean',['feature-state','team'],false], .8,
          .6] } });
    MAP.addLayer({ id:'country-borders', type:'line', source:'countries',
      paint:{'line-color':'#2d5a7a','line-width':['interpolate',['linear'],['zoom'],1,.4,5,1.1]} });
    MAP.addLayer({ id:'country-labels', type:'symbol', source:'countries',
      layout:{ 'text-field':['get','NAME'],'text-font':['Noto Sans Regular'],
        'text-size':['interpolate',['linear'],['zoom'],1,9,5,15],'text-transform':'uppercase',
        'text-letter-spacing':.05,'visibility':'none' },
      paint:{'text-color':'#cfe2f2','text-halo-color':'#081726','text-halo-width':1.4} });
    const sel=document.getElementById('team');
    DATA.teams.forEach(t=>{ const o=document.createElement('option'); o.value=t.name;
      o.textContent=`${t.name}  (${t.stats.n_born_abroad}/${t.stats.squad_size} born abroad)`; sel.appendChild(o); });
  });
  MAP.on('click','country-fill', e=>{ if(mode==='game' && e.features[0]) onGuess(e.features[0].id); });
  MAP.on('mouseenter','country-fill',()=>{ if(mode==='game' && round && !round.done) MAP.getCanvas().style.cursor='pointer'; });
  MAP.on('mouseleave','country-fill',()=> MAP.getCanvas().style.cursor='');

  // explore handlers
  document.getElementById('reveal').onclick=()=>revealTeam(document.getElementById('team').value);
  document.getElementById('team').onchange=e=>{ if(e.target.value) revealTeam(e.target.value); };
  document.getElementById('reset').onclick=resetExplore;
  document.getElementById('labels').onclick=toggleLabels;
  // tabs
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchMode(t.dataset.mode));
  // game handlers
  document.getElementById('clueBtn').onclick=nextClue;
  document.getElementById('nextBtn').onclick=newRound;
}

/* ---------- shared map helpers ---------- */
function clearStates(keys){ shaded.forEach(iso=>{ const s={}; keys.forEach(k=>s[k]=false); MAP.setFeatureState({source:'countries',id:iso},s); }); }
function clearShading(){ shaded.forEach(iso=>MAP.setFeatureState({source:'countries',id:iso},{home:false,origin:false,team:false,correct:false,wrong:false})); shaded.clear(); }
function clearMarkers(){ markers.forEach(m=>m.remove()); markers=[]; }
function setState(iso,st){ MAP.setFeatureState({source:'countries',id:iso},st); shaded.add(iso); }
function toggleLabels(){ labelsOn=!labelsOn;
  MAP.setLayoutProperty('country-labels','visibility',labelsOn?'visible':'none');
  document.getElementById('labels').textContent='Labels: '+(labelsOn?'on':'off'); }

function dropPin(p, home){
  const el=document.createElement('div'); el.className='pin '+(home?'home':'foreign');
  const popup=new maplibregl.Popup({offset:18,closeButton:false}).setHTML(
    `<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)">${p.born_city||''}, ${p.born_in}</div>`+
    `<div style="margin-top:5px"><b>${p.name}</b> · ${POS[p.pos]||p.pos} · ${p.club}</div>`);
  const m=new maplibregl.Marker({element:el,anchor:'bottom'}).setLngLat([p.lng,p.lat]).setPopup(popup).addTo(MAP);
  markers.push(m); return m;
}

/* ---------- mode switching ---------- */
function switchMode(m){
  if(m===mode) return; mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.mode===m));
  document.getElementById('explorePanel').style.display = m==='explore'?'block':'none';
  document.getElementById('gamePanel').style.display    = m==='game'?'block':'none';
  document.getElementById('legend').style.display       = m==='explore'?'block':'none';
  clearShading(); clearMarkers();
  document.getElementById('stat').style.display='none';
  if(m==='game'){ if(!round) newRound(); else { highlightTeams(); MAP.flyTo({center:[8,26],zoom:1.7}); } }
  else { MAP.flyTo({center:[8,26],zoom:1.7}); }
}

/* ---------- EXPLORE ---------- */
function resetExplore(){ clearShading(); clearMarkers(); document.getElementById('stat').style.display='none';
  document.getElementById('team').value=''; document.getElementById('exploreHint').style.display='block';
  MAP.flyTo({center:[8,26],zoom:1.7}); }

function revealTeam(name){
  if(!name) return; const team=DATA.teams.find(t=>t.name===name); if(!team) return;
  clearShading(); clearMarkers();
  setState(team.iso3,{home:true});
  Object.entries(team.birth_iso3).forEach(([c,iso])=>{ if(iso!==team.iso3) setState(iso,{origin:true}); });
  const groups={};
  team.players.forEach(p=>{ if(p.lat==null) return; const k=p.lat.toFixed(2)+','+p.lng.toFixed(2);
    (groups[k]=groups[k]||{lat:p.lat,lng:p.lng,city:p.born_city,country:p.born_in,players:[]}).players.push(p); });
  const bounds=new maplibregl.LngLatBounds();
  Object.values(groups).forEach(g=>{
    const home=g.country===team.name;
    const el=document.createElement('div'); el.className='pin '+(home?'home':'foreign');
    if(g.players.length>1){ const b=document.createElement('div'); b.className='badge'; b.textContent=g.players.length; el.appendChild(b); }
    const rows=g.players.map(p=>{ const t=p.switched_from.length?`<div style="color:var(--teal);font-size:11.5px">↪ also: ${p.switched_from.join(', ')}</div>`:'';
      return `<div style="margin:2px 0"><b>${p.name}</b> <span style="color:var(--muted)">· ${POS[p.pos]||p.pos} · ${p.club}</span>${t}</div>`; }).join('');
    const popup=new maplibregl.Popup({offset:18,closeButton:false}).setHTML(
      `<div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)">${g.city||''}, ${g.country}</div><div style="margin-top:6px">${rows}</div>`);
    markers.push(new maplibregl.Marker({element:el,anchor:'bottom'}).setLngLat([g.lng,g.lat]).setPopup(popup).addTo(MAP));
    bounds.extend([g.lng,g.lat]);
  });
  if(!bounds.isEmpty()) MAP.fitBounds(bounds,{padding:{top:90,bottom:60,left:380,right:60},maxZoom:5,duration:900});
  const s=team.stats, st=document.getElementById('stat');
  const chips=Object.entries(s.foreign_born_counts).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<span class="chip">${c} <span class="n">${n}</span></span>`).join('');
  document.getElementById('exploreHint').style.display='none';
  st.style.display='block';
  st.innerHTML=`<b>${team.name}</b> — <b>${s.n_born_abroad}/${s.squad_size}</b> born abroad (${s.pct_born_abroad}%), across <b>${s.n_distinct_birth_countries}</b> countries.`
    +`${s.n_switchers?`<br><b>${s.n_switchers}</b> previously played for another nation.`:''}${chips?`<div class="chips">${chips}</div>`:''}`;
}

/* ---------- WHOSE TEAM? ---------- */
function highlightTeams(){ clearShading(); DATA.teams.forEach(t=>{ if(t.iso3) setState(t.iso3,{team:true}); }); }

function featureBounds(iso){
  const f=GEO.features.find(x=>x.id===iso); if(!f) return null;
  const b=new maplibregl.LngLatBounds();
  (function add(cs){ cs.forEach(c=> typeof c[0]==='number' ? b.extend(c) : add(c)); })(f.geometry.coordinates);
  return b;
}

function buildClues(p, team){
  const c=[];
  c.push(['Born in', `${p.born_city?p.born_city+', ':''}${p.born_in}`]);
  c.push(['Profile', `${POS[p.pos]||p.pos}, ${age(p.dob)} years old`]);
  const otherYouth=p.youth_for.filter(x=>x!==team.name);
  if(p.youth_for.length) c.push(['Youth career', `Played youth international football for ${p.youth_for.join(', ')}`]);
  if(p.citizenships.length>1) c.push(['Eligibility', `Holds citizenship of ${p.citizenships.join(', ')}`]);
  c.push(['Club', `Plays his club football for ${p.club}`]);
  return c;
}

function newRound(){
  // pick an unused interesting player
  let cand; let guard=0;
  do{ cand=POOL[Math.floor(Math.random()*POOL.length)]; guard++; } while(used.has(cand.p.name)&&guard<200);
  used.add(cand.p.name);
  round={ p:cand.p, team:cand.team, clues:buildClues(cand.p,cand.team), shown:0, wrongs:0, done:false };
  clearShading(); clearMarkers(); highlightTeams();
  MAP.flyTo({center:[8,26],zoom:1.7});
  document.getElementById('clues').innerHTML='';
  document.getElementById('result').style.display='none';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('clueBtn').style.display='';
  document.getElementById('clueBtn').disabled=false;
  document.getElementById('gameHint').style.display='block';
  updateLives(); nextClue();
}

function nextClue(){
  if(!round||round.done) return;
  if(round.shown>=round.clues.length){ document.getElementById('clueBtn').disabled=true; return; }
  const [k,v]=round.clues[round.shown++];
  const div=document.createElement('div'); div.className='clue'; div.innerHTML=`<span class="k">${k}</span>${v}`;
  document.getElementById('clues').appendChild(div);
  if(round.shown>=round.clues.length) document.getElementById('clueBtn').disabled=true;
  document.getElementById('cluePts').textContent = ` (−20 pts)`;
}

function roundPoints(){ return Math.max(10, 100 - 20*(round.shown-1) - 30*round.wrongs); }
function updateLives(){ const left=3-round.wrongs;
  document.getElementById('lives').textContent='●'.repeat(Math.max(0,left))+'○'.repeat(round.wrongs); }

function onGuess(iso){
  if(!round||round.done) return;
  const team=round.team;
  if(iso===team.iso3){
    const pts=roundPoints(); score+=pts; solved++; played++;
    setState(iso,{team:false,correct:true});
    endRound(true, pts);
  } else {
    round.wrongs++; updateLives();
    // flash the wrong country red briefly
    if(TEAM_BY_ISO[iso]){ MAP.setFeatureState({source:'countries',id:iso},{team:false,wrong:true}); shaded.add(iso);
      setTimeout(()=>MAP.setFeatureState({source:'countries',id:iso},{wrong:false,team:true}),750); }
    if(round.wrongs>=3){ played++; endRound(false,0); }
  }
}

function endRound(win, pts){
  round.done=true;
  const team=round.team, p=round.p;
  // reveal: shade answer green + drop their birthplace pin
  setState(team.iso3,{team:false,correct:true});
  dropPin(p, p.born_in===team.name);
  // frame both the birthplace and the country they represent ("born here → plays there")
  const b = featureBounds(team.iso3) || new maplibregl.LngLatBounds();
  if(p.lng!=null) b.extend([p.lng,p.lat]);
  MAP.fitBounds(b,{padding:{top:90,bottom:70,left:380,right:60},maxZoom:5,duration:900});
  document.getElementById('score').textContent=score;
  document.getElementById('solved').textContent=solved;
  document.getElementById('played').textContent=played;
  document.getElementById('clueBtn').style.display='none';
  document.getElementById('nextBtn').style.display='';
  document.getElementById('gameHint').style.display='none';
  const story = p.born_in!==team.name ? `Born in <b>${p.born_in}</b>, plays for <b>${team.name}</b>.`
                                      : `Plays for <b>${team.name}</b>.`;
  const sw = p.switched_from.length? ` Earlier represented ${p.switched_from.join(', ')}.`:'';
  const r=document.getElementById('result');
  r.className='result '+(win?'win':'lose'); r.style.display='block';
  r.innerHTML = (win?`✅ <b>Correct!</b> <span class="pts">+${pts}</span><br>`:`❌ <b>${team.name}</b><br>`)
    + `It was <b>${p.name}</b>. ${story}${sw}`;
}
init();
</script>
</body>
</html>
